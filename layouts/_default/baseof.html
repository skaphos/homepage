<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ "images/skaphos-favicon-fullcolor.svg" | relURL }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap">
  <style>
    :root {
      --color-bg: #F7FAFC;
      --color-surface: #FFFFFF;
      --color-text: #0B1F33;
      --color-text-muted: #4A5D70;
      --color-primary: #0E6BA8;
      --color-primary-strong: #055A8C;
      --color-accent: #2A9D8F;
      --color-border: #D7E1EA;
      --color-success: #2E7D32;
      --color-warning: #C27A00;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Source Sans 3", "Segoe UI", sans-serif;
      line-height: 1.6;
      color: var(--color-text);
      background: radial-gradient(circle at 0% -10%, #dceefa 0%, var(--color-bg) 40%),
                  radial-gradient(circle at 100% 0%, #e4f7f2 0%, transparent 45%),
                  var(--color-bg);
    }

    h1, h2, h3 {
      font-family: "Space Grotesk", "Avenir Next", sans-serif;
      line-height: 1.2;
      margin-top: 0;
      color: var(--color-text);
    }

    a {
      color: var(--color-primary);
      text-decoration: none;
    }

    a:hover {
      color: var(--color-primary-strong);
    }

    .container {
      width: min(1040px, 100% - 2rem);
      margin: 0 auto;
    }

    header {
      border-bottom: 1px solid var(--color-border);
      background: color-mix(in srgb, var(--color-surface) 90%, transparent);
      backdrop-filter: blur(4px);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    nav {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 0.75rem 1.5rem;
      padding: 0.9rem 0;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      color: inherit;
      font-weight: 700;
      font-size: 1.5rem;
    }

    .brand img {
      width: 99px;
      height: 99px;
      object-fit: contain;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      list-style: none;
      margin: 0;
      padding: 0;
      justify-self: center;
    }

    .nav-links a {
      display: inline-block;
      padding: 0.4rem 0.7rem;
      border-radius: 999px;
      font-weight: 600;
    }

    .nav-links a:hover {
      background: #e9f2f8;
    }

    .nav-meta {
      display: inline-flex;
      align-items: center;
      gap: 0.65rem;
      justify-self: end;
    }

    .nav-repo {
      font-family: var(--font-mono, ui-monospace, SFMono-Regular, Menlo, monospace);
      font-size: 0.72rem;
      color: var(--color-text-muted);
      letter-spacing: 0.02em;
    }

    .btn-star {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.35rem 0.75rem;
      border-radius: 999px;
      background: var(--color-k8s, var(--color-primary));
      color: #fff;
      font-family: "Space Grotesk", "Avenir Next", sans-serif;
      font-weight: 600;
      font-size: 0.8rem;
      border: 1px solid var(--color-k8s, var(--color-primary));
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }

    .btn-star:hover {
      background: var(--color-k8s-strong, var(--color-primary-strong));
      border-color: var(--color-k8s-strong, var(--color-primary-strong));
      color: #fff;
    }

    .btn-star .star { font-size: 0.9rem; line-height: 1; }

    main {
      padding: 2.2rem 0 2.8rem;
      animation: fade-in 0.35s ease-out;
    }

    @keyframes fade-in {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .hero {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 14px;
      padding: clamp(1.2rem, 2.5vw, 2rem);
      margin-bottom: 1.6rem;
      box-shadow: 0 8px 20px rgb(11 31 51 / 0.05);
    }

    .tagline {
      display: inline-flex;
      font-size: 0.84rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--color-accent);
      margin-bottom: 0.5rem;
    }

    .section {
      margin-top: 1.6rem;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 1rem;
      margin-bottom: 0.9rem;
    }

    .card-grid {
      display: grid;
      gap: 1rem;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    }

    .card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 12px;
      padding: 1rem;
      height: 100%;
    }

    .card p:last-child {
      margin-bottom: 0;
    }

    .meta {
      color: var(--color-text-muted);
      margin-top: 0.3rem;
      margin-bottom: 0.7rem;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 0.2rem 0.55rem;
      font-size: 0.78rem;
      font-weight: 700;
      border: 1px solid transparent;
      margin-bottom: 0.65rem;
    }

    .badge.status-released {
      background: #edf7ee;
      border-color: #cae9cf;
      color: var(--color-success);
    }

    .badge.status-planned {
      background: #fff7e8;
      border-color: #f1ddb1;
      color: var(--color-warning);
    }

    .badge.status-active {
      background: #e8f3fb;
      border-color: #bfd7ea;
      color: var(--color-primary-strong);
    }

    .badge.status-proposed {
      background: #f2f5f8;
      border-color: #d7e1ea;
      color: var(--color-text-muted);
    }

    .prose {
      color: var(--color-text);
    }

    .prose p,
    .prose ul,
    .prose ol {
      margin-top: 0;
      margin-bottom: 0.85rem;
    }

    .prose ul {
      padding-left: 1.1rem;
    }

    .meta-list {
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .meta-list li {
      margin-bottom: 0.35rem;
      color: var(--color-text-muted);
    }

    .profile-avatar {
      width: 128px;
      height: 128px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--color-border);
      margin-bottom: 0.9rem;
      display: block;
      background: var(--color-surface);
    }

    footer {
      margin-top: 3rem;
      border-top: 1px solid var(--color-border);
      background: var(--color-surface);
      color: var(--color-text-muted);
      padding: 1.2rem 0 1.5rem;
      font-size: 0.92rem;
    }

    footer .foot-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.5rem 1.5rem;
    }

    footer .foot-row p { margin: 0; }

    footer .foot-links {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    footer .foot-links a {
      color: var(--color-text-muted);
      font-family: "Space Grotesk", "Avenir Next", sans-serif;
      font-weight: 600;
    }

    footer .foot-links a:hover { color: var(--color-text); }

    @media (max-width: 820px) {
      .nav-repo { display: none; }
    }

    @media (max-width: 640px) {
      nav {
        grid-template-columns: 1fr auto;
        row-gap: 0.6rem;
      }

      .nav-links {
        grid-column: 1 / -1;
        width: 100%;
        justify-self: stretch;
        justify-content: flex-start;
      }

      .nav-links a {
        padding-left: 0;
        padding-right: 0;
      }

      .nav-meta { justify-self: end; }
    }

    /* Skaphos homepage — additive styles for the portfolio-first landing (wireframe C).
       Scoped to .hero-landing / .card-tool / .card-sibling / .team-card so nothing
       leaks into the shared .hero / .card / .badge used by list.html and single.html. */

    :root {
      --color-k8s: #326CE5;
      --color-k8s-strong: #2656b8;
      --color-accent-weak: #e4f7f2;
      --font-mono: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
    }

    .mono { font-family: var(--font-mono); }

    /* ---------- Hero (landing-specific, overrides card chrome on .hero) ---------- */
    .hero-landing {
      background: transparent;
      border: 0;
      border-radius: 0;
      box-shadow: none;
      padding: clamp(1.2rem, 2.5vw, 2rem) 0 1.2rem;
      margin-bottom: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 2rem;
      align-items: end;
    }
    .eyebrow {
      display: inline-flex; align-items: center; gap: 0.5rem;
      font-family: var(--font-mono); font-size: 0.72rem;
      font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--color-text-muted);
      margin-bottom: 0.9rem;
    }
    .eyebrow-dot { width: 6px; height: 6px; border-radius: 999px; background: var(--color-k8s); }
    .hero-landing h1 {
      font-size: clamp(2.2rem, 4.2vw, 3.2rem);
      font-weight: 600;
      margin: 0 0 0.5rem;
      max-width: 20ch;
      text-wrap: balance;
      letter-spacing: -0.01em;
    }
    .hero-landing h1 em {
      font-style: normal;
      color: var(--color-primary);
    }
    .hero-landing .lede {
      font-size: 1.1rem; color: var(--color-text-muted);
      max-width: 58ch; margin: 0 0 1.4rem;
      text-wrap: pretty;
    }
    .hero-ctas { display: flex; gap: 0.6rem; flex-wrap: wrap; }

    .btn {
      display: inline-flex; align-items: center; gap: 0.45rem;
      padding: 0.7rem 1.1rem;
      border-radius: 8px;
      font-family: "Space Grotesk", "Avenir Next", sans-serif;
      font-weight: 600; font-size: 0.95rem;
      border: 1.5px solid transparent;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s, transform 0.05s;
    }
    .btn:active { transform: translateY(1px); }
    .btn-k8s { background: var(--color-k8s); border-color: var(--color-k8s); color: #fff; }
    .btn-k8s:hover { background: var(--color-k8s-strong); border-color: var(--color-k8s-strong); color: #fff; }
    .btn-ghost { background: transparent; border-color: var(--color-border); color: var(--color-text); }
    .btn-ghost:hover { border-color: var(--color-text); color: var(--color-text); }
    .btn .arrow { transition: transform 0.15s; }
    .btn:hover .arrow { transform: translateX(2px); }

    /* Hero portfolio-at-a-glance aside */
    .hero-side {
      display: none;
      border: 1px solid var(--color-border);
      background: var(--color-surface);
      border-radius: 12px;
      padding: 1rem 1.1rem;
      min-width: 240px;
      box-shadow: 0 2px 10px rgb(11 31 51 / 0.03);
    }
    .hero-side .hs-label {
      font-family: var(--font-mono); font-size: 0.7rem;
      text-transform: uppercase; letter-spacing: 0.06em;
      color: var(--color-text-muted); margin-bottom: 0.55rem;
    }
    .hero-side ul { list-style: none; margin: 0; padding: 0; display: grid; gap: 0.45rem; }
    .hero-side li {
      display: grid; grid-template-columns: auto 1fr auto; gap: 0.6rem;
      align-items: center; font-size: 0.92rem;
    }
    .hero-side .hs-name { font-weight: 600; font-family: "Space Grotesk", sans-serif; }
    .hero-side .hs-status {
      font-family: var(--font-mono); font-size: 0.68rem;
      text-transform: uppercase; letter-spacing: 0.04em;
      color: var(--color-text-muted);
    }
    .hs-dot { width: 7px; height: 7px; border-radius: 999px; display: inline-block; }
    .hs-dot.status-released { background: var(--color-success); }
    .hs-dot.status-active   { background: var(--color-primary-strong); }
    .hs-dot.status-planned  { background: var(--color-warning); }
    .hs-dot.status-proposed { background: #9aa7b5; }
    .hs-dot.hs-dot-sibling  { background: var(--color-accent); }
    @media (min-width: 920px) { .hero-side { display: block; } }

    /* ---------- Section head ---------- */
    .section-head h2 {
      display: inline-flex; align-items: baseline; gap: 0.6rem;
      font-size: 1.3rem; font-weight: 600; margin: 0;
    }
    .section-head .section-idx {
      font-family: var(--font-mono); font-size: 0.8rem;
      color: var(--color-text-muted); font-weight: 500;
    }
    .section-head .hd-link {
      font-family: "Space Grotesk", "Avenir Next", sans-serif;
      font-weight: 600; font-size: 0.95rem;
    }

    /* ---------- Suite row (2-up, landing only) ---------- */
    .suite-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 1rem;
    }
    @media (max-width: 760px) {
      .suite-grid { grid-template-columns: 1fr; }
    }

    /* Tool index grid — auto-fit (used on /tools/) */
    .tool-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1rem;
    }

    .card-adjacent { border-left: 3px solid var(--color-accent); }

    /* Landing tool cards — richer than generic .card, scoped via .card-tool */
    .card-tool {
      border-radius: 14px;
      padding: 1.3rem 1.3rem 1.15rem;
      position: relative;
      display: flex; flex-direction: column;
      transition: border-color 0.15s, box-shadow 0.15s, transform 0.15s;
    }
    .card-tool .badge { align-self: flex-start; }
    .card-tool:hover {
      border-color: #b7cadb;
      box-shadow: 0 6px 24px rgb(11 31 51 / 0.06);
      transform: translateY(-1px);
    }
    .card-tool h3 {
      margin: 0.3rem 0 0.2rem;
      font-size: 1.5rem;
      font-weight: 600;
    }
    .card-tool h3 a { color: inherit; }
    .card-tool h3 a:hover { color: var(--color-primary); }
    .card-tool .tagline-line {
      color: var(--color-text-muted);
      margin: 0 0 0.9rem;
      font-size: 0.98rem;
    }
    .card-tool .prose { font-size: 0.95rem; margin-bottom: 0.9rem; }
    .card-tool .bullets {
      margin: 0 0 1rem; padding: 0; list-style: none;
      display: grid; gap: 0.3rem;
    }
    .card-tool .bullets li {
      position: relative; padding-left: 1.1rem;
      font-size: 0.94rem;
      color: var(--color-text);
    }
    .card-tool .bullets li::before {
      content: ''; position: absolute; left: 0; top: 0.65em;
      width: 6px; height: 6px; border-radius: 999px;
      background: var(--color-k8s);
      opacity: 0.6;
    }
    .card-tool .module-line {
      font-family: var(--font-mono); font-size: 0.78rem;
      color: var(--color-text-muted);
      margin: auto 0 0;
      padding-top: 0.85rem;
      border-top: 1px dashed var(--color-border);
      display: flex; justify-content: space-between; align-items: center;
      gap: 0.6rem;
    }
    .card-tool .module-line .tool-link {
      font-family: "Space Grotesk", "Avenir Next", sans-serif;
      font-weight: 600; font-size: 0.85rem;
    }

    /* Landing badge override — mono uppercase with a leading dot */
    .card-tool .badge,
    .card-sibling .badge {
      gap: 0.4rem;
      padding: 0.22rem 0.65rem 0.22rem 0.55rem;
      font-family: var(--font-mono);
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .card-tool .badge::before,
    .card-sibling .badge::before {
      content: '';
      width: 6px; height: 6px; border-radius: 999px;
      background: currentColor;
    }

    /* ---------- Sibling project row ---------- */
    .sibling-row { margin-top: 1.2rem; }
    .sibling-head {
      display: flex; align-items: baseline; gap: 0.7rem;
      margin-bottom: 0.7rem;
    }
    .sibling-head h3 {
      font-size: 1rem; font-weight: 600; margin: 0;
      color: var(--color-text);
    }
    .sibling-head .desc {
      font-size: 0.88rem; color: var(--color-text-muted);
    }
    .card-sibling {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 1.4rem;
      border-radius: 14px;
      padding: 1.15rem 1.3rem;
      border-left: 3px solid var(--color-accent);
    }
    .card-sibling + .card-sibling { margin-top: 0.8rem; }
    @media (max-width: 760px) {
      .card-sibling { grid-template-columns: 1fr; gap: 0.8rem; }
    }
    .card-sibling h3 { font-size: 1.25rem; margin: 0.25rem 0 0.15rem; }
    .card-sibling h3 a { color: inherit; }
    .card-sibling h3 a:hover { color: var(--color-primary); }
    .card-sibling .tagline-line { color: var(--color-text-muted); margin: 0 0 0.6rem; font-size: 0.98rem; }
    .card-sibling .summary { color: var(--color-text); font-size: 0.95rem; margin: 0 0 0.7rem; }
    .card-sibling .module-line {
      font-family: var(--font-mono); font-size: 0.78rem;
      color: var(--color-text-muted);
      margin: 0;
      display: flex; justify-content: space-between; align-items: center;
      gap: 0.6rem;
    }
    .card-sibling .module-line .tool-link {
      font-family: "Space Grotesk", "Avenir Next", sans-serif;
      font-weight: 600; font-size: 0.85rem;
    }
    .card-sibling .cmds {
      margin: 0; padding: 0; list-style: none;
      display: grid; gap: 0.25rem;
      align-self: start;
    }
    .card-sibling .cmds li {
      font-family: var(--font-mono); font-size: 0.82rem;
      color: var(--color-text-muted);
    }
    .card-sibling .cmds .tok { color: var(--color-accent); font-weight: 500; }

    /* ---------- Principles strip (right below hero, ticker-style) ---------- */
    .principles-strip {
      margin: 0.4rem 0 1.8rem;
      border-top: 1px solid var(--color-border);
      border-bottom: 1px solid var(--color-border);
      background: var(--color-surface);
      padding: 0.2rem 0;
    }
    .principles {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      list-style: none; margin: 0; padding: 0;
    }
    .principles li {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.85rem 1.1rem;
      border-left: 1px solid var(--color-border);
      background: transparent;
      border-radius: 0;
    }
    .principles li:first-child { border-left: 0; }
    .principles .p-num {
      font-family: var(--font-mono);
      font-size: 0.78rem;
      color: var(--color-k8s);
      font-weight: 500;
      letter-spacing: 0.04em;
      flex-shrink: 0;
    }
    .principles .p-text {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    .principles .p-title {
      font-family: "Space Grotesk", "Avenir Next", sans-serif;
      font-size: 1rem;
      font-weight: 600;
      color: var(--color-text);
      line-height: 1.2;
    }
    .principles .p-sub {
      font-size: 0.85rem;
      color: var(--color-text-muted);
      line-height: 1.3;
    }
    @media (max-width: 760px) {
      .principles { grid-template-columns: repeat(2, 1fr); }
      .principles li:nth-child(3) { border-left: 0; }
    }
    @media (max-width: 480px) {
      .principles { grid-template-columns: 1fr; }
      .principles li { border-left: 0; border-top: 1px solid var(--color-border); }
      .principles li:first-child { border-top: 0; }
    }

    /* ---------- Team row ---------- */
    .team-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 1rem;
    }
    @media (max-width: 640px) { .team-grid { grid-template-columns: 1fr; } }
    .team-card {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 1rem;
      align-items: start;
    }
    .team-card .avatar {
      width: 72px; height: 72px; border-radius: 50%;
      object-fit: cover;
      border: 1px solid var(--color-border);
      background: var(--color-surface);
      display: block;
    }
    .team-card .avatar-initials {
      width: 72px; height: 72px; border-radius: 50%;
      display: grid; place-items: center;
      font-family: "Space Grotesk", sans-serif;
      font-weight: 600; font-size: 1.5rem;
      color: var(--color-primary);
      background: #e7f0f8;
      border: 1px solid var(--color-border);
    }
    .team-card h3 { font-size: 1.15rem; margin: 0.1rem 0; }
    .team-card h3 a { color: inherit; }
    .team-card h3 a:hover { color: var(--color-primary); }
    .team-card .role {
      color: var(--color-text-muted);
      font-size: 0.82rem;
      margin: 0 0 0.5rem;
      font-family: var(--font-mono);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .team-card .summary {
      font-size: 0.95rem; color: var(--color-text);
      margin: 0 0 0.55rem;
    }
    .team-card .links {
      display: flex; gap: 0.8rem;
      font-size: 0.88rem;
    }
    .team-card .links a {
      font-family: "Space Grotesk", "Avenir Next", sans-serif;
      font-weight: 600;
    }

    /* ---------- Responsive ---------- */
